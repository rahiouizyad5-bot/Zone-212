<!DOCTYPE html>  
<html lang="fr">  
<head>  
<meta charset="UTF-8">  
<title>Zone 212</title>  
  
<style>  
body {  
    margin: 0;  
    padding: 0;  
    background: black;  
    color: white;  
    font-family: Arial, sans-serif;  
    text-align: center;  
    overflow: hidden;  
}  
  
/* Image arrière-plan */  
.bg {  
    position: fixed;  
    top: 0;  
    left: 0;  
    width: 100%;  
    height: 100%;  
    background: url('sabre.jpg') no-repeat center center/cover;  
    opacity: 0.3;  
    z-index: -1;  
}  
  
/* Logo */  
.logo {  
    margin-top: 80px;  
    width: 250px;  
}  
  
/* Texte principal */  
h1 {  
    font-size: 80px;  
    margin-top: 50px;  
    letter-spacing: 5px;  
    font-weight: bold;  
}  
  
/* Effet stylé */  
h1 span {  
    border-bottom: 4px solid white;  
    padding-bottom: 10px;  
}  
</style>  
  
</head>  
  
<body>  
  
<div class="bg"></div>  
  
<img src="logo.png" class="logo">  
  
<h1><span>COMING SOON</span></h1>  
  
</body>  
</html>
